<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>trove</title>
    <script>
      // Set light/dark mode before paint to avoid a flash. LIGHT default.
      try {
        document.documentElement.dataset.mode =
          localStorage.getItem("trove-theme") === "dark" ? "dark" : "light";
      } catch (e) {
        document.documentElement.dataset.mode = "light";
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./app.tsx"></script>
  </body>
</html>
